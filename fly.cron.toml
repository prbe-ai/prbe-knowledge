app = "prbe-knowledge-cron"
primary_region = "sjc"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "services/cron/Dockerfile"

[env]
  ENVIRONMENT  = "main"
  LOG_LEVEL    = "INFO"
  SERVICE_NAME = "prbe-knowledge-cron"

# Generic cron host for the prbe-knowledge repo. ALL nightly / scheduled
# one-shot jobs in this repo run here. Each scheduled job is its own
# GitHub Actions cron entry that fires `flyctl machine run --command "..."`
# against this app's image.
#
# Currently scheduled (see .github/workflows/knowledge-cron.yml):
#   * wiki-nightly  (02:00 UTC) -> python -m services.synthesis.nightly_trigger
#   * leiden-nightly (03:00 UTC) -> python -m scripts.leiden_one_shot --all-customers --yes
#
# The [processes].cron entry below is a placeholder that the workflow's
# --command flag overrides. We keep it as the wiki nightly trigger so a
# manual `flyctl machine run --app prbe-knowledge-cron` (no --command)
# does the most-likely-intended thing.
#
# Image dependencies (services/cron/Dockerfile):
#   * libigraph-dev + leidenalg + python-igraph for the leiden cron
#   * full python app for the wiki nightly trigger
#
# Why one app for many jobs:
#   * Same image, same release process — every cron command sees the
#     latest synthesis + community code without N independent fly apps.
#   * Cheaper: one image build, one deploy slot, instead of one fly
#     app per scheduled command.
#   * Generic name avoids needing a new fly app each time we add a
#     scheduled job.
#
# Why scheduling is in GitHub Actions (not fly's [[machines]] schedule):
#   * GH Actions cron is exact (we asked for 02:00 UTC, we got it).
#   * Fly's [[machines]] schedule = "daily" is coarse (fly picks the hour).
#   * Workflow logs are the audit trail.
[processes]
  cron = "python -m services.synthesis.nightly_trigger"

# Tiny by default — wiki nightly is <60 s. The leiden cron temporarily
# spikes memory while building the igraph for each tenant; igraph + a
# 1M-edge graph fits comfortably under 512MB. Bump to 1gb if a tenant
# graph grows past ~5M edges.
[[vm]]
  size      = "shared-cpu-1x"
  memory    = "1gb"
  count     = 1
  processes = ["cron"]
