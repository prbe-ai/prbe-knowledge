app = "prbe-knowledge-poller"
primary_region = "sjc"
kill_signal = "SIGINT"
kill_timeout = "30s"

# Reuses the worker Dockerfile — same code, different CMD via [processes].
[build]
  dockerfile = "services/worker/Dockerfile"

[env]
  ENVIRONMENT          = "main"
  LOG_LEVEL            = "INFO"
  SERVICE_NAME         = "prbe-knowledge-poller"
  POLLER_HEALTH_PORT   = "8083"

[processes]
  poller = "python -m services.ingestion.poller"

[[restart]]
  policy      = "always"
  max_retries = 10

# ---------------------------------------------------------------------------
# SHARP EDGE — POLLER MUST STAY AT 1 MACHINE.
#
# `min_machines_running = 1` below is a FLOOR not a CAP — Fly will run more
# if it decides to (e.g. autoscaler, deploy quirks). The deploy workflow
# re-asserts `flyctl scale count poller=1` after every deploy as enforcement.
# If you ever bump it manually, you're asking for trouble:
#   - Each tick produces N pg_notify events per customer (de-dup at SQL level
#     keeps correctness, but it's wasteful).
#   - The in-process rate limiter inside connector.backfill() lets each
#     instance spend its own 4 rps budget — total spend would exceed Granola's
#     5 rps limit and we'd start eating 429s.
#
# Before scaling out: introduce a Postgres advisory lock around the tick
# (`pg_try_advisory_lock(hashtext('granola_poller_tick'))`) AND move the
# Granola rate budget into a shared store (Redis token bucket).
# ---------------------------------------------------------------------------
[http_service]
  internal_port        = 8083
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["poller"]

  [[http_service.checks]]
    grace_period = "15s"
    interval     = "15s"
    method       = "GET"
    timeout      = "5s"
    path         = "/health"

[[vm]]
  size      = "shared-cpu-1x"
  memory    = "256mb"
  processes = ["poller"]
