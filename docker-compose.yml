# Turnkey self-host stack for the Probe knowledge engine (community edition).
#
#   cp .env.example .env   # fill in GOOGLE_API_KEY + one LLM key
#   docker compose up
#
# Brings up: Postgres (pgvector), MinIO (object store), a one-shot DB migrate,
# then ingestion + retrieval + worker + mcp. Single-tenant mode
# (DEFAULT_CUSTOMER_ID) means no control plane and no *.prbe.ai egress. The
# `cron` profile adds the nightly knowledge-page synthesis trigger. The MCP
# server (services/mcp, vendored from prbe-knowledge-mcp) runs in `static`
# auth mode here — point your client at http://localhost:8084/mcp with
# `Authorization: Bearer $MCP_API_TOKEN`.
#
# All app services share ONE image built from services/ingestion/Dockerfile and
# override `command` — the engine code is identical across roles.

x-engine: &engine
  build:
    context: .
    dockerfile: services/ingestion/Dockerfile
  image: prbe-knowledge:local
  env_file:
    - .env
  environment: &engine-env
    # Service discovery inside the compose network.
    DATABASE_URL: postgresql://prbe:prbe@postgres:5432/prbe_knowledge
    DATABASE_URL_SYNC: postgresql+psycopg://prbe:prbe@postgres:5432/prbe_knowledge
    R2_ENDPOINT_URL: http://minio:9000
    R2_ACCESS_KEY_ID: minioadmin
    R2_SECRET_ACCESS_KEY: minioadmin
    ENVIRONMENT: local

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: prbe-knowledge-postgres
    environment:
      POSTGRES_USER: prbe
      POSTGRES_PASSWORD: prbe
      POSTGRES_DB: prbe_knowledge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prbe -d prbe_knowledge"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: prbe-knowledge-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the per-tenant object-storage bucket for the default tenant.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/prbe-knowledge-default &&
      echo 'bucket ready'"
    restart: "no"

  # One-shot: apply the schema (fresh DB) or run alembic upgrade (existing DB).
  migrate:
    <<: *engine
    container_name: prbe-knowledge-migrate
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "scripts/migrate.py"]
    restart: "no"

  ingestion:
    <<: *engine
    container_name: prbe-knowledge-ingestion
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    # migrate already prepared the DB; skip the Dockerfile's alembic prefix.
    command: ["uvicorn", "services.ingestion.main:app", "--host", "::", "--port", "8080", "--workers", "2"]
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  retrieval:
    <<: *engine
    container_name: prbe-knowledge-retrieval
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    command: ["uvicorn", "services.retrieval.main:app", "--host", "::", "--port", "8081", "--workers", "2"]
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # MCP server (vendored from prbe-knowledge-mcp). Reaches retrieval over the
  # compose network — no *.prbe.ai egress. Community single-tenant auth: a
  # static bearer (MCP_API_TOKEN) scoped to DEFAULT_CUSTOMER_ID. (Hosted/managed
  # builds set MCP_OAUTH_* instead and resolve to oauth mode automatically.)
  mcp:
    <<: *engine
    container_name: prbe-knowledge-mcp
    depends_on:
      retrieval:
        condition: service_healthy
    environment:
      <<: *engine-env
      MCP_AUTH_MODE: static
      MCP_API_TOKEN: ${MCP_API_TOKEN:-local-mcp-token}
      DEFAULT_CUSTOMER_ID: ${DEFAULT_CUSTOMER_ID:-default}
      KNOWLEDGE_QUERY_URL: http://retrieval:8081
      INTERNAL_KNOWLEDGE_API_KEY: ${INTERNAL_KNOWLEDGE_API_KEY:-local-internal-key}
    command: ["uvicorn", "services.mcp.main:app", "--host", "::", "--port", "8084", "--workers", "2"]
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    <<: *engine
    container_name: prbe-knowledge-worker
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    command: ["python", "-m", "services.ingestion.worker"]

  # Optional: nightly knowledge-page synthesis trigger. Meant to run on a
  # schedule (cron / k8s CronJob); `docker compose --profile cron up` fires it
  # once. Leave out of the default `up`.
  cron:
    <<: *engine
    container_name: prbe-knowledge-cron
    profiles: ["cron"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "services.synthesis.nightly_trigger"]
    restart: "no"

volumes:
  postgres-data:
  minio-data:
