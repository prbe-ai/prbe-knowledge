apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "probe-knowledge.configMapName" . }}
  labels:
    {{- include "probe-knowledge.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  # Single-tenant community mode.
  DEFAULT_CUSTOMER_ID: {{ .Values.config.defaultCustomerId | quote }}
  ENVIRONMENT: {{ .Values.config.environment | quote }}

  # Object store (non-secret config; credentials live in the Secret).
  R2_ENDPOINT_URL: {{ required "config.objectStore.endpointUrl is required" .Values.config.objectStore.endpointUrl | quote }}
  R2_REGION: {{ .Values.config.objectStore.region | quote }}
  R2_BUCKET_PREFIX: {{ .Values.config.objectStore.bucketPrefix | quote }}

  {{- with .Values.config.llmGatewayUrl }}
  LLM_GATEWAY_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.otlpEndpoint }}
  GRAFANA_OTLP_ENDPOINT: {{ . | quote }}
  {{- end }}
