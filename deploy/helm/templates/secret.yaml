{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "probe-knowledge.secretName" . }}
  labels:
    {{- include "probe-knowledge.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  # Database DSNs (derived from bundled Postgres or postgresql.external.*).
  DATABASE_URL: {{ include "probe-knowledge.databaseUrl" . | quote }}
  DATABASE_URL_SYNC: {{ include "probe-knowledge.databaseUrlSync" . | quote }}

  # Object-store credentials.
  R2_ACCESS_KEY_ID: {{ .Values.secrets.r2AccessKeyId | quote }}
  R2_SECRET_ACCESS_KEY: {{ .Values.secrets.r2SecretAccessKey | quote }}

  # Required provider / engine secrets.
  GOOGLE_API_KEY: {{ .Values.secrets.googleApiKey | quote }}
  TOKEN_ENCRYPTION_KEY: {{ .Values.secrets.tokenEncryptionKey | quote }}
  KNOWLEDGE_API_TOKEN: {{ .Values.secrets.knowledgeApiToken | quote }}

  {{- with .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.llmGatewayKey }}
  LLM_GATEWAY_KEY: {{ . | quote }}
  {{- end }}

  # Optional connector credentials (only the ones you set).
  {{- range $k, $v := .Values.secrets.connectors }}
  {{- if $v }}
  {{ $k | snakecase | upper }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
{{- end }}
