apiVersion: v1
kind: Service
metadata:
  name: {{ include "probe-knowledge.fullname" . }}-retrieval
  labels:
    {{- include "probe-knowledge.componentLabels" (dict "ctx" . "component" "retrieval") | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    {{- include "probe-knowledge.componentSelectorLabels" (dict "ctx" . "component" "retrieval") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.retrieval.port }}
      targetPort: http
      protocol: TCP
