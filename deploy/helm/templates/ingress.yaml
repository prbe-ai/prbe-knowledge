{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "probe-knowledge.fullname" . }}
  labels:
    {{- include "probe-knowledge.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ required "ingress.retrievalHost is required when ingress.enabled=true" .Values.ingress.retrievalHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "probe-knowledge.fullname" . }}-retrieval
                port:
                  number: {{ .Values.retrieval.port }}
    {{- with .Values.ingress.ingestionHost }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "probe-knowledge.fullname" $ }}-ingestion
                port:
                  number: {{ $.Values.ingestion.port }}
    {{- end }}
{{- end }}
