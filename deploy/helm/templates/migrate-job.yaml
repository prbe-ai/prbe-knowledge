{{- if .Values.migrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  # Unique per-revision name so the hook Job never collides with a prior run.
  name: {{ include "probe-knowledge.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "probe-knowledge.componentLabels" (dict "ctx" . "component" "migrate") | nindent 4 }}
  annotations:
    # Runs before the Deployments (lower weight runs first), on install + upgrade.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: {{ .Values.migrate.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "probe-knowledge.componentSelectorLabels" (dict "ctx" . "component" "migrate") | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "probe-knowledge.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "probe-knowledge.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          # Apply db/schema.sql (fresh) or alembic upgrade head (existing).
          command: ["python", "scripts/migrate.py"]
          env:
            {{- include "probe-knowledge.env" . | nindent 12 }}
          resources:
            {{- toYaml .Values.migrate.resources | nindent 12 }}
{{- end }}
