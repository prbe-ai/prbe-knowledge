app = "prbe-knowledge-worker"
primary_region = "sjc"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "services/worker/Dockerfile"

[env]
  ENVIRONMENT           = "main"
  LOG_LEVEL             = "INFO"
  SERVICE_NAME          = "prbe-knowledge-worker"
  WORKER_HEALTH_PORT    = "8082"
  # Parallel claim loops per machine. 18 machines × 4 = 72 in-flight
  # slots, sustained throughput ~360 batches/min at p50=12s/batch.
  # Sized for OpenAI Tier 1 (1M TPM, 3000 RPM): each in-flight batch
  # makes ≤1 embed_many call per cycle, so 72 RPM well under the cap.
  # Bump concurrency to 6 once Tier 4+ lands.
  WORKER_MAX_CONCURRENT = "4"

[processes]
  worker = "python -m services.ingestion.worker"

# Fly should always try to bring the worker back. No HTTP traffic drives
# this process — a single transient DB reconnect during a deploy is enough
# to exit non-zero, and without an explicit policy Fly leaves the machine
# stopped until human intervention.
[[restart]]
  policy      = "always"
  max_retries = 10

# Pin liveness to the worker's own /health endpoint + guarantee 1 running
# machine at all times. auto_stop=false because there's no inbound traffic
# to "idle" on; min_machines_running=1 keeps one up even when the health
# check briefly fails during rolling deploys.
[http_service]
  internal_port        = 8082
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["worker"]

  [[http_service.checks]]
    grace_period = "15s"
    interval     = "15s"
    method       = "GET"
    timeout      = "5s"
    path         = "/health"

[[vm]]
  size   = "shared-cpu-2x"
  # 3gb because long Claude Code sessions hold the merged event list +
  # chunked content + in-flight embedding payloads in memory. At
  # WORKER_MAX_CONCURRENT=4 worst case is ~4 × ~430 MB = ~1.7 GB peak;
  # 3 GB gives headroom for GC + OS + a memory-bursty session. 2gb OOMed
  # under concurrency=2 with very long sessions; see incident 2026-04-29.
  memory = "3gb"
  # 18 machines × concurrency 4 = 72 in-flight slots, ~360 batches/min
  # ceiling at p50=12s/batch. Sized for ~300+ concurrent claude_code
  # sessions at 1 batch/min/session. Bump count when sustained queue
  # depth exceeds ~50 pending rows.
  count     = 18
  processes = ["worker"]
