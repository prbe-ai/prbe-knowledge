app = "prbe-knowledge-worker"
primary_region = "sjc"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "services/worker/Dockerfile"

[env]
  ENVIRONMENT           = "main"
  LOG_LEVEL             = "INFO"
  SERVICE_NAME          = "prbe-knowledge-worker"
  WORKER_HEALTH_PORT    = "8082"
  # Parallel claim loops per machine. 18 machines × 6 = 108 in-flight
  # slots, sustained throughput ~540 batches/min at p50=12s/batch.
  # Sized for OpenAI Tier 5 (10M TPM, 10k RPM): each in-flight batch
  # makes ≤1 embed_many call per cycle, well under the cap.
  # Memory is the binding constraint, not OpenAI — push to 8 only after
  # bumping VM memory to 4gb.
  WORKER_MAX_CONCURRENT = "6"

[processes]
  worker = "python -m services.ingestion.worker"

# Fly should always try to bring the worker back. No HTTP traffic drives
# this process — a single transient DB reconnect during a deploy is enough
# to exit non-zero, and without an explicit policy Fly leaves the machine
# stopped until human intervention.
[[restart]]
  policy      = "always"
  max_retries = 10

# Pin liveness to the worker's own /health endpoint + guarantee 1 running
# machine at all times. auto_stop=false because there's no inbound traffic
# to "idle" on; min_machines_running=1 keeps one up even when the health
# check briefly fails during rolling deploys.
[http_service]
  internal_port        = 8082
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["worker"]

  [[http_service.checks]]
    grace_period = "15s"
    interval     = "15s"
    method       = "GET"
    timeout      = "5s"
    path         = "/health"

[[vm]]
  size   = "shared-cpu-2x"
  # 3gb because long Claude Code sessions hold the merged event list +
  # chunked content + in-flight embedding payloads in memory. At
  # WORKER_MAX_CONCURRENT=6 worst case is ~6 × ~430 MB = ~2.6 GB peak;
  # 3 GB gives a thin GC + OS margin. 2gb OOMed under concurrency=2 with
  # very long sessions; see incident 2026-04-29. Resize to 4gb before
  # pushing concurrency past 6.
  memory = "3gb"
  # 18 machines × concurrency 6 = 108 in-flight slots, ~540 batches/min
  # ceiling at p50=12s/batch. Holds ~500 concurrent claude_code sessions
  # at 1 batch/min/session — that's only ~7% headroom, so bump count
  # before hitting that ceiling, not after. Sustained queue depth >50
  # pending rows is the trigger.
  count     = 18
  processes = ["worker"]
