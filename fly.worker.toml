app = "prbe-knowledge-worker"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "services/worker/Dockerfile"

[env]
  ENVIRONMENT  = "main"
  LOG_LEVEL    = "INFO"
  SERVICE_NAME = "prbe-knowledge-worker"

[processes]
  worker = "python -m services.ingestion.worker"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
  processes = ["worker"]
