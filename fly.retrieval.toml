app = "prbe-knowledge-retrieval"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "services/retrieval/Dockerfile"

[env]
  ENVIRONMENT  = "main"
  LOG_LEVEL    = "INFO"
  SERVICE_NAME = "prbe-knowledge-retrieval"

[http_service]
  internal_port       = 8081
  force_https         = true
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1
  processes           = ["app"]

  [http_service.concurrency]
    type      = "requests"
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "15s"
    method       = "GET"
    timeout      = "5s"
    path         = "/health"

[[vm]]
  size   = "shared-cpu-2x"
  memory = "1gb"
