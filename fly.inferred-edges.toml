app = "prbe-knowledge-inferred-edges"
primary_region = "sjc"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "services/ingestion/inferred_edges/Dockerfile"

[env]
  ENVIRONMENT                  = "main"
  LOG_LEVEL                    = "INFO"
  SERVICE_NAME                 = "prbe-knowledge-inferred-edges"
  INFERRED_EDGES_HEALTH_PORT   = "8083"
  # 16 async tasks per machine.  4 machines => 64 concurrent drain slots.
  # NOTE: count in [[vm]] does NOT auto-apply on deploy.
  # After deploy run: flyctl scale count 4 -a prbe-knowledge-inferred-edges
  INFERRED_EDGES_CONCURRENCY   = "16"

[processes]
  worker = "python -m services.ingestion.inferred_edges.worker"

[[restart]]
  policy      = "always"
  max_retries = 10

# Health endpoint binds 0.0.0.0 (IPv4) inside the container so Fly's
# http_service.checks IPv4 probe can reach it.
# (feedback_fly_health_check_ipv4.md)
[http_service]
  internal_port        = 8083
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["worker"]

  [[http_service.checks]]
    grace_period = "15s"
    interval     = "15s"
    method       = "GET"
    timeout      = "5s"
    path         = "/health"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "1gb"
  # count = 4 here is informational -- Fly ignores [[vm]].count on deploy.
  # After first deploy run: flyctl scale count 4 -a prbe-knowledge-inferred-edges
  count     = 1
  processes = ["worker"]
