app = "prbe-knowledge-ingestion"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "services/ingestion/Dockerfile"

[deploy]
  release_command = "alembic upgrade head"
  strategy        = "rolling"

[env]
  ENVIRONMENT  = "main"
  LOG_LEVEL    = "INFO"
  SERVICE_NAME = "prbe-knowledge-ingestion"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1
  processes           = ["app"]

  [http_service.concurrency]
    type      = "requests"
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "15s"
    method       = "GET"
    timeout      = "5s"
    path         = "/health"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
