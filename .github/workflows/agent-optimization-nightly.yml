# Nightly codebase-improvement workflow.
#
# Generalized from the original retrieval-agent-only optimizer (PR #305 /
# PR #318). Now reads THREE input signals to find improvement
# opportunities anywhere in the codebase:
#   A. Yesterday's retrieval-agent trace digests (high signal, narrow scope)
#   B. Commits to main since the last successful run
#   C. Probe MCP — team operational memory (Slack / GitHub / Linear /
#      Notion / Sentry) via mcp.prbe.ai using the internal-key auth path
#
# Flow:
#   1. Kill switch (vars.AGENT_OPTIMIZATION_ENABLED)
#   2. K8s Job in managed-shared cluster builds per-trace digest JSONL
#   3. Workflow tails the job's stdout → /tmp/digests.jsonl  (empty is OK)
#   4. Compute commits-since-last-successful-run → /tmp/commits-since-last-run.log
#   5. List open auto-optimization PRs (dedup)
#   6. Render mcp-config.json from template (Probe MCP HTTP server)
#   7. Run Claude Code orchestrator headless with --mcp-config. Orchestrator
#      triages across A/B/C then dispatches up to MAX_PRS subagents:
#        - retrieval-agent track → traces + commits + MCP
#        - generic track          → commits + MCP only
#      Subagents do NOT push or open PRs.
#   8. Push all auto-opt/* branches + open draft PRs. NO path-diff gate —
#      draft PR + human review is the safety net.
#   9. Build digest summary, send via Resend (always) and Sendblue
#      iMessage (on action / failure / needs-human).
#   10. Upload artifact + cleanup digest job.
#
# Required secrets:
#   ANTHROPIC_API_KEY           — Claude Code
#   GH_PAT                      — push branches + open PRs
#   DIGITALOCEAN_ACCESS_TOKEN   — kubectl access to probe-managed cluster
#   PROBE_MCP_INTERNAL_KEY      — mcp.prbe.ai internal-key auth (matches
#                                 managed-data-plane.env INTERNAL_BACKEND_API_KEY)
#   PROBE_MCP_CUSTOMER_ID       — slug for probe-founders customer
#                                 (must be the slug "probe-founders", NOT
#                                 the CP customers.id UUID; data plane keys
#                                 RLS scoping by slug)
#   RESEND_API_KEY              — daily digest email
#   RESEND_FROM_ADDRESS         — verified Resend sender (e.g. nightly@prbe.ai)
#   SENDBLUE_API_KEY_ID         — Sendblue iMessage API key (from dashboard.sendblue.com)
#   SENDBLUE_API_SECRET         — paired secret
#   SENDBLUE_FROM_NUMBER        — Sendblue-provisioned sending number (+1XXXXXXXXXX)
#   SENDBLUE_TO_NUMBER          — destination phone (+1XXXXXXXXXX)
name: agent-optimization-nightly

on:
  workflow_dispatch:
    inputs:
      max_prs:
        description: "Cap on PRs opened (default 3; set 1 for first dispatch)"
        type: number
        default: 3
      target_date:
        description: "UTC date to digest (default: yesterday)"
        type: string
        default: ""
  schedule:
    - cron: "0 10 * * *"   # 10:00 UTC daily = 3 AM PT (PDT) / 2 AM PT (PST)

permissions:
  contents: write
  pull-requests: write
  actions: read   # look up this workflow's previous successful run sha

concurrency:
  group: agent-optimization
  cancel-in-progress: false

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NIGHTLY_IMPROVEMENT_MAX_PRS: ${{ inputs.max_prs || 3 }}

    steps:
      - name: Kill switch
        run: |
          if [ "${{ vars.AGENT_OPTIMIZATION_ENABLED }}" = "false" ]; then
            echo "::notice::AGENT_OPTIMIZATION_ENABLED=false — exiting cleanly."
            exit 0
          fi
          echo "kill switch: proceeding."

      - uses: actions/checkout@v4
        with:
          # Subagents create worktrees off origin/main — need full history.
          fetch-depth: 0

      - name: Configure kubectl for managed-shared cluster
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - run: doctl kubernetes cluster kubeconfig save probe-managed

      - name: Resolve target date + current knowledge image tag
        id: ctx
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.target_date }}" ]; then
            TARGET_DATE="${{ inputs.target_date }}"
          else
            TARGET_DATE="$(date -u -d yesterday +%F)"
          fi
          echo "target_date=$TARGET_DATE" >> "$GITHUB_OUTPUT"

          IMAGE_TAG=$(kubectl -n managed get deploy managed-retrieval \
            -o jsonpath='{.spec.template.spec.containers[0].image}' \
            | sed 's|.*:||')
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          JOB_SUFFIX="$(date +%s | tail -c 6)"
          echo "job_suffix=$JOB_SUFFIX" >> "$GITHUB_OUTPUT"
          echo "Target: $TARGET_DATE, image tag: $IMAGE_TAG, job suffix: $JOB_SUFFIX"

      - name: Render + launch trace-digest K8s Job
        id: launch
        run: |
          set -euo pipefail
          DATE="${{ steps.ctx.outputs.target_date }}"
          JOB_SUFFIX="${{ steps.ctx.outputs.job_suffix }}"
          IMAGE_TAG="${{ steps.ctx.outputs.image_tag }}"
          JOB_NAME="nightly-trace-digest-${DATE}-${JOB_SUFFIX}"
          echo "job_name=$JOB_NAME" >> "$GITHUB_OUTPUT"

          sed \
            -e "s|DATE_PLACEHOLDER|${DATE}|g" \
            -e "s|JOB_SUFFIX_PLACEHOLDER|${JOB_SUFFIX}|g" \
            -e "s|IMAGE_TAG_PLACEHOLDER|${IMAGE_TAG}|g" \
            k8s/jobs/nightly-trace-digest.yaml > /tmp/job.yaml

          echo "--- rendered Job (head) ---"
          head -10 /tmp/job.yaml
          kubectl apply -f /tmp/job.yaml

      - name: Wait for digest job + stream output
        id: digest
        run: |
          set -euo pipefail
          kubectl -n managed wait \
            --for=condition=complete \
            --timeout=20m \
            "job/${{ steps.launch.outputs.job_name }}"
          POD=$(kubectl -n managed get pods \
            -l "job-name=${{ steps.launch.outputs.job_name }}" \
            -o jsonpath='{.items[0].metadata.name}')
          kubectl -n managed logs "$POD" > /tmp/digests.jsonl
          LINE_COUNT=$(wc -l < /tmp/digests.jsonl | tr -d ' ')
          echo "line_count=$LINE_COUNT" >> "$GITHUB_OUTPUT"
          echo "Pulled $LINE_COUNT digest line(s)."
          if [ "$LINE_COUNT" = "0" ]; then
            echo "::notice::No traces for ${{ steps.ctx.outputs.target_date }} — retrieval-agent track will be quiet; generic track continues."
          fi

      - name: Compute commits since last successful run
        id: commits
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Tolerate API failures (token scope, transient) — fall back to last-30 below.
          LAST_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/agent-optimization-nightly.yml/runs?status=success&per_page=1" \
            --jq '.workflow_runs[0].head_sha // ""' 2>/dev/null || echo "")
          if [ -z "$LAST_SHA" ] || ! git cat-file -e "$LAST_SHA^{commit}" 2>/dev/null; then
            echo "::notice::No prior successful run sha (or sha not in history) — falling back to last 30 commits."
            git log origin/main -30 --pretty=format:'%h %s' --name-status > /tmp/commits-since-last-run.log
          else
            echo "Last successful run sha: $LAST_SHA"
            git log "${LAST_SHA}..origin/main" --pretty=format:'%h %s' --name-status > /tmp/commits-since-last-run.log
          fi
          COMMIT_COUNT=$(grep -cE '^[a-f0-9]{7,8} ' /tmp/commits-since-last-run.log || echo 0)
          echo "commit_count=$COMMIT_COUNT" >> "$GITHUB_OUTPUT"
          echo "Commits since last run: $COMMIT_COUNT"

      - name: Ensure auto-optimization label exists
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh label create auto-optimization \
            --repo prbe-ai/prbe-knowledge \
            --description "Draft PR produced by nightly improvement workflow" \
            --color BFD4F2 2>/dev/null || true

      - name: List open auto-optimization PRs (dedup input)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh pr list --repo prbe-ai/prbe-knowledge \
            --label auto-optimization --state open \
            --json number,title,body \
            > /tmp/open-auto-prs.json
          echo "Open auto-PRs: $(jq length /tmp/open-auto-prs.json)"

      - name: Render Probe MCP config from template
        env:
          PROBE_MCP_INTERNAL_KEY: ${{ secrets.PROBE_MCP_INTERNAL_KEY }}
          PROBE_MCP_CUSTOMER_ID: ${{ secrets.PROBE_MCP_CUSTOMER_ID }}
        run: |
          set -euo pipefail
          if [ -z "${PROBE_MCP_INTERNAL_KEY:-}" ] || [ -z "${PROBE_MCP_CUSTOMER_ID:-}" ]; then
            echo "::warning::PROBE_MCP_INTERNAL_KEY or PROBE_MCP_CUSTOMER_ID missing — orchestrator will run without Probe MCP."
            echo '{"mcpServers": {}}' > /tmp/mcp-config.json
            exit 0
          fi
          sed \
            -e "s|__PROBE_MCP_INTERNAL_KEY__|${PROBE_MCP_INTERNAL_KEY}|g" \
            -e "s|__PROBE_MCP_CUSTOMER_ID__|${PROBE_MCP_CUSTOMER_ID}|g" \
            .github/mcp-config.json.template > /tmp/mcp-config.json
          # Don't echo contents — secret is inlined.
          echo "MCP config rendered (keys redacted)."

      - name: Ensure sub-agent staging dirs exist
        # Defensive — subagents are told to mkdir -p these in the prompt,
        # but if any subagent skips that step its title/body Write fails
        # silently and the push step drops the branch. Create them here
        # so the workflow never relies on subagent prompt compliance.
        run: mkdir -p /tmp/auto-opt-staging/titles /tmp/auto-opt-staging/bodies

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run orchestrator (headless)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          NIGHTLY_IMPROVEMENT_MAX_PRS: ${{ env.NIGHTLY_IMPROVEMENT_MAX_PRS }}
        run: |
          set -euo pipefail
          # Runner is the sandbox; --dangerously-skip-permissions lets the
          # orchestrator touch /tmp (digests, summary, sub-agent worktrees,
          # staging files) without thrashing on per-call permission prompts.
          # The draft-PR + human-review flow is the actual safety gate.
          claude -p "$(cat .github/prompts/nightly-optimization.md)" \
            --output-format stream-json \
            --verbose \
            --max-turns 120 \
            --dangerously-skip-permissions \
            --mcp-config /tmp/mcp-config.json \
            --strict-mcp-config \
            2>&1 | tee /tmp/orchestrator.log
          if [ ! -f /tmp/orchestrator-summary.json ]; then
            echo "::warning::orchestrator-summary.json not written — agent may have aborted."
            echo '{"candidates_identified":0,"prs_opened":0,"tracks":{"retrieval-agent":0,"generic":0},"skipped":[],"branches":[]}' \
              > /tmp/orchestrator-summary.json
          fi
          jq . /tmp/orchestrator-summary.json

      - name: Push branches + open PRs
        id: push
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          # No path-diff gate — draft PR + human review is the safety net.
          # The prompt's advisory blocklist asks the agent to write
          # /tmp/needs-human-*.md instead of touching dangerous paths.
          OPENED=0
          : > /tmp/opened-prs.txt  # truncate; digest step reads this verbatim
          while read -r branch; do
            [ -z "$branch" ] && continue
            STAGING_TITLE="/tmp/auto-opt-staging/titles/$(basename "$branch")"
            STAGING_BODY="/tmp/auto-opt-staging/bodies/$(basename "$branch")"
            if [ ! -f "$STAGING_TITLE" ] || [ ! -f "$STAGING_BODY" ]; then
              echo "::warning::missing title/body for $branch — skipping PR open"
              continue
            fi
            git push origin "$branch"
            TITLE=$(cat "$STAGING_TITLE")
            PR_URL=$(gh pr create --draft --label auto-optimization \
              --reviewer richardwei6 \
              --head "$branch" \
              --title "$TITLE" \
              --body "$(cat "$STAGING_BODY")")
            echo "- $TITLE — $PR_URL" >> /tmp/opened-prs.txt
            OPENED=$((OPENED + 1))
          done < <(git branch --list 'auto-opt/*' --format='%(refname:short)')
          echo "opened=$OPENED" >> "$GITHUB_OUTPUT"
          echo "Opened $OPENED draft PR(s)."
          # Stamp the real count into the summary for the notification step.
          jq --argjson n "$OPENED" '.prs_opened=$n' /tmp/orchestrator-summary.json \
            > /tmp/orchestrator-summary.tmp
          mv /tmp/orchestrator-summary.tmp /tmp/orchestrator-summary.json

      - name: Build notification digest
        id: digestnote
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TARGET_DATE: ${{ steps.ctx.outputs.target_date }}
          STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          PRS_OPENED=$(jq -r '.prs_opened // 0' /tmp/orchestrator-summary.json 2>/dev/null || echo 0)
          CANDIDATES=$(jq -r '.candidates_identified // 0' /tmp/orchestrator-summary.json 2>/dev/null || echo 0)
          SKIPPED=$(jq -r '.skipped | length // 0' /tmp/orchestrator-summary.json 2>/dev/null || echo 0)
          NEEDS_HUMAN=$(find /tmp -maxdepth 1 -name 'needs-human-*.md' 2>/dev/null | wc -l | tr -d ' ')
          {
            echo "prs_opened=$PRS_OPENED"
            echo "candidates=$CANDIDATES"
            echo "skipped=$SKIPPED"
            echo "needs_human=$NEEDS_HUMAN"
            echo "status=$STATUS"
          } >> "$GITHUB_OUTPUT"

          # PR list is whatever the push step actually opened (written
          # verbatim to /tmp/opened-prs.txt). No gh search needed.
          PR_LIST=""
          if [ -s /tmp/opened-prs.txt ]; then
            PR_LIST=$(cat /tmp/opened-prs.txt)
          fi
          # Per-skip reason can be a paragraph; cap to ~120 chars per row
          # so the digest stays readable when there are 4+ skips.
          SKIP_LIST=$(jq -r '.skipped // [] | .[] | "  - \(.slug // .track // "?"): \(.reason)" | .[0:140]' \
            /tmp/orchestrator-summary.json 2>/dev/null || echo "")

          # Top-of-digest order: highest-signal lines first (status + run
          # URL + PRs), then verbose skip rationale last. Sendblue's
          # iMessage cap (~1000 chars) truncates from the bottom, so if
          # anything gets cut it's the skipped-pattern detail, not the
          # action items.
          {
            echo "Probe nightly improvement run — $TARGET_DATE"
            echo "Status: $STATUS | PRs drafted: $PRS_OPENED | Candidates: $CANDIDATES | Skipped: $SKIPPED | needs-human: $NEEDS_HUMAN"
            echo "Run: $RUN_URL"
            echo ""
            if [ -n "$PR_LIST" ]; then
              echo "Drafted PRs:"
              echo "$PR_LIST"
              echo ""
            fi
            if [ -n "$SKIP_LIST" ]; then
              echo "Skipped patterns:"
              echo "$SKIP_LIST"
              echo ""
            fi
          } > /tmp/digest.txt
          cat /tmp/digest.txt

      - name: Send Resend email
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_ADDRESS: ${{ secrets.RESEND_FROM_ADDRESS }}
          TARGET_DATE: ${{ steps.ctx.outputs.target_date }}
          STATUS: ${{ steps.digestnote.outputs.status }}
          PRS_OPENED: ${{ steps.digestnote.outputs.prs_opened }}
        run: |
          set -euo pipefail
          if [ -z "${RESEND_API_KEY:-}" ] || [ -z "${RESEND_FROM_ADDRESS:-}" ]; then
            echo "::warning::RESEND_API_KEY or RESEND_FROM_ADDRESS missing — skipping email."
            exit 0
          fi
          SUBJECT="Probe nightly $TARGET_DATE — ${PRS_OPENED:-0} PR(s) — $STATUS"
          BODY_TEXT=$(cat /tmp/digest.txt)
          BODY_HTML=$(printf '<pre style="font-family:ui-monospace,Menlo,monospace;white-space:pre-wrap;font-size:13px;">%s</pre>' \
            "$(python3 -c 'import sys,html;print(html.escape(sys.stdin.read()),end="")' < /tmp/digest.txt)")
          PAYLOAD=$(jq -n \
            --arg from "$RESEND_FROM_ADDRESS" \
            --arg to "richard@prbe.ai" \
            --arg subject "$SUBJECT" \
            --arg text "$BODY_TEXT" \
            --arg html "$BODY_HTML" \
            '{from:$from, to:[$to], subject:$subject, text:$text, html:$html}')
          curl -fsS -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            | jq -r '.id // .' \
            || echo "::warning::Resend send failed"

      - name: Send Sendblue iMessage (digest)
        # Drops `needs_human != '0'` — when there's a needs-human note,
        # the dedicated "Ask user via apps-plane" step below sends a
        # focused question iMessage instead, so we don't double-send.
        if: always() && (steps.digestnote.outputs.prs_opened != '0' || steps.digestnote.outputs.status != 'success')
        env:
          SENDBLUE_API_KEY_ID: ${{ secrets.SENDBLUE_API_KEY_ID }}
          SENDBLUE_API_SECRET: ${{ secrets.SENDBLUE_API_SECRET }}
          SENDBLUE_FROM_NUMBER: ${{ secrets.SENDBLUE_FROM_NUMBER }}
          SENDBLUE_TO_NUMBER: ${{ secrets.SENDBLUE_TO_NUMBER }}
        run: |
          set -euo pipefail
          if [ -z "${SENDBLUE_API_KEY_ID:-}" ] || [ -z "${SENDBLUE_API_SECRET:-}" ] || [ -z "${SENDBLUE_TO_NUMBER:-}" ]; then
            echo "::warning::Sendblue secrets missing (need SENDBLUE_API_KEY_ID + SENDBLUE_API_SECRET + SENDBLUE_TO_NUMBER) — skipping iMessage."
            exit 0
          fi
          # Sendblue's blue-bubble cap is ~1000 chars per message; the
          # digest is ordered status+url+PRs-first so a truncation here
          # only ever loses the trailing skipped-pattern rationale.
          BODY=$(head -c 1000 /tmp/digest.txt)
          PAYLOAD=$(jq -n \
            --arg number "$SENDBLUE_TO_NUMBER" \
            --arg from_number "${SENDBLUE_FROM_NUMBER:-}" \
            --arg content "$BODY" \
            'if $from_number == "" then {number:$number, content:$content} else {number:$number, from_number:$from_number, content:$content} end')
          curl -fsS -X POST https://api.sendblue.co/api/send-message \
            -H "sb-api-key-id: $SENDBLUE_API_KEY_ID" \
            -H "sb-api-secret-key: $SENDBLUE_API_SECRET" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            | jq -r '.message_handle // .status // .' \
            || echo "::warning::Sendblue send failed"

      - name: Ask user via apps-plane (needs-human handoff)
        # Async loop: when the orchestrator wrote /tmp/needs-human-*.md
        # notes, hand the FIRST one off to apps.prbe.ai/api/sendblue/ask.
        # That service stores the question, sends an iMessage, and
        # listens for the reply on its inbound webhook. When the reply
        # arrives, it fires repository_dispatch nightly-resume back here
        # (handled by .github/workflows/nightly-improvement-resume.yml).
        # The remaining needs-human notes (if any) wait in the apps-plane
        # queue and get asked one-at-a-time as each prior is answered.
        if: always() && steps.digestnote.outputs.needs_human != '0'
        env:
          APPS_PLANE_URL: ${{ vars.APPS_PLANE_URL || 'https://apps.prbe.ai' }}
          # Apps-plane's /api/sendblue/ask is auth'd against
          # `internal_backend_api_key`, which equals the existing
          # INTERNAL_BACKEND_API_KEY value we already store in GH
          # secrets as PROBE_MCP_INTERNAL_KEY (same source-of-truth).
          INTERNAL_BACKEND_KEY: ${{ secrets.PROBE_MCP_INTERNAL_KEY }}
          PROBE_MCP_CUSTOMER_ID: ${{ secrets.PROBE_MCP_CUSTOMER_ID }}
          SENDBLUE_TO_NUMBER: ${{ secrets.SENDBLUE_TO_NUMBER }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${INTERNAL_BACKEND_KEY:-}" ] || [ -z "${SENDBLUE_TO_NUMBER:-}" ]; then
            echo "::warning::Cannot ask via apps-plane — PROBE_MCP_INTERNAL_KEY or SENDBLUE_TO_NUMBER missing."
            exit 0
          fi
          # Take the first needs-human note (lexicographic — the
          # orchestrator writes them as needs-human-<slug>.md so this
          # is stable per slug). Apps-plane queues additional ones
          # automatically if there's already an open question.
          NOTE=$(find /tmp -maxdepth 1 -name 'needs-human-*.md' 2>/dev/null | sort | head -1)
          if [ -z "$NOTE" ]; then
            echo "::warning::digestnote claimed needs_human > 0 but no /tmp/needs-human-*.md found"
            exit 0
          fi
          SLUG=$(basename "$NOTE" .md | sed 's/^needs-human-//')
          NOTE_TEXT=$(cat "$NOTE")
          # Question for iMessage = first non-empty line of the note,
          # capped to ~200 chars. If the note's first line is a
          # markdown header (#…), strip it. Tail with the slug so the
          # user has context.
          QUESTION=$(printf '%s' "$NOTE_TEXT" | grep -m1 -v '^[[:space:]]*$' | sed -E 's/^#+ +//' | head -c 200)
          if [ -z "$QUESTION" ]; then
            QUESTION="Needs human input on candidate: $SLUG"
          fi
          QUESTION_WITH_TAIL="$QUESTION  (slug: $SLUG · reply yes/no/details)"

          # POST to apps-plane.  Context blob carries everything the
          # resume workflow needs to rebuild the candidate without
          # re-fetching artifacts.
          PAYLOAD=$(jq -n \
            --arg customer_id "$PROBE_MCP_CUSTOMER_ID" \
            --arg to_number "$SENDBLUE_TO_NUMBER" \
            --arg question "$QUESTION_WITH_TAIL" \
            --arg run_id "${{ github.run_id }}" \
            --arg run_url "$RUN_URL" \
            --arg candidate_slug "$SLUG" \
            --arg customer_id_ctx "$PROBE_MCP_CUSTOMER_ID" \
            --arg note_text "$NOTE_TEXT" \
            '{customer_id:$customer_id, to_number:$to_number, question:$question, context:{run_id:$run_id, run_url:$run_url, candidate_slug:$candidate_slug, customer_id:$customer_id_ctx, note_text:$note_text}}')
          RESP=$(curl -fsS -X POST "${APPS_PLANE_URL}/api/sendblue/ask" \
            -H "X-Internal-Backend-Key: $INTERNAL_BACKEND_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" 2>&1)
          echo "$RESP" | jq -r '{question_id, status, marker}' || echo "$RESP"

      - name: Upload orchestrator summary as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-summary-${{ steps.ctx.outputs.target_date }}
          path: |
            /tmp/orchestrator-summary.json
            /tmp/orchestrator.log
            /tmp/digests.jsonl
            /tmp/commits-since-last-run.log
            /tmp/needs-human-*.md
            /tmp/digest.txt
          retention-days: 14

      - name: Cleanup digest job
        if: always()
        run: |
          kubectl -n managed delete job "${{ steps.launch.outputs.job_name }}" \
            --ignore-not-found=true
