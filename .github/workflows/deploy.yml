name: deploy

# Disabled: deploys are handled by Fly's native GitHub integration
# (each app attached to this repo with its own fly.<service>.toml).
# Flip the trigger back to `push: branches: [main]` if you want
# GitHub Actions to own deploys instead.
on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy ingestion
        run: flyctl deploy --remote-only -c fly.ingestion.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy retrieval
        run: flyctl deploy --remote-only -c fly.retrieval.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy worker
        run: flyctl deploy --remote-only -c fly.worker.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
