name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ingestion:      ${{ steps.filter.outputs.ingestion      == 'true' || github.event_name == 'workflow_dispatch' }}
      retrieval:      ${{ steps.filter.outputs.retrieval      == 'true' || github.event_name == 'workflow_dispatch' }}
      worker:         ${{ steps.filter.outputs.worker         == 'true' || github.event_name == 'workflow_dispatch' }}
      poller:         ${{ steps.filter.outputs.poller         == 'true' || github.event_name == 'workflow_dispatch' }}
      wiki_worker:    ${{ steps.filter.outputs.wiki_worker    == 'true' || github.event_name == 'workflow_dispatch' }}
      wiki_synthesis: ${{ steps.filter.outputs.wiki_synthesis == 'true' || github.event_name == 'workflow_dispatch' }}
      wiki_cron:      ${{ steps.filter.outputs.wiki_cron      == 'true' || github.event_name == 'workflow_dispatch' }}
      wiki_bootstrap: ${{ steps.filter.outputs.wiki_bootstrap == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ingestion:
              - 'services/ingestion/**'
              - 'shared/**'
              - 'db/migrations/**'
              - 'alembic.ini'
              - 'fly.ingestion.toml'
              - 'pyproject.toml'
            retrieval:
              - 'services/retrieval/**'
              - 'shared/**'
              - 'fly.retrieval.toml'
              - 'pyproject.toml'
            worker:
              - 'services/ingestion/**'
              - 'services/worker/**'
              - 'shared/**'
              - 'scripts/**'
              - 'fly.worker.toml'
              - 'pyproject.toml'
            poller:
              - 'services/ingestion/**'
              - 'services/worker/**'
              - 'shared/**'
              - 'scripts/**'
              - 'fly.poller.toml'
              - 'pyproject.toml'
            wiki_worker:
              - 'services/synthesis/**'
              - 'services/ingestion/normalizer.py'
              - 'services/ingestion/handlers/**'
              - 'services/worker/**'
              - 'shared/**'
              - 'fly.wiki-worker.toml'
              - 'pyproject.toml'
            wiki_synthesis:
              - 'services/synthesis/**'
              - 'services/ingestion/normalizer.py'
              - 'services/ingestion/handlers/**'
              - 'services/worker/**'
              - 'shared/**'
              - 'fly.wiki-synthesis.toml'
              - 'pyproject.toml'
            wiki_cron:
              - 'services/synthesis/**'
              - 'services/worker/**'
              - 'shared/**'
              - 'fly.wiki-cron.toml'
              - 'pyproject.toml'
            wiki_bootstrap:
              - 'services/synthesis/**'
              - 'services/ingestion/normalizer.py'
              - 'services/ingestion/handlers/**'
              - 'services/worker/**'
              - 'shared/**'
              - 'fly.wiki-backfill.toml'
              - 'pyproject.toml'
            community:
              - 'services/community/**'
              - 'shared/**'
              - 'fly.community.toml'
              - 'pyproject.toml'
            inferred_edges:
              - 'services/ingestion/inferred_edges/**'
              - 'services/ingestion/normalizer.py'
              - 'shared/**'
              - 'fly.inferred-edges.toml'
              - 'pyproject.toml'

  deploy-ingestion:
    needs: changes
    if: needs.changes.outputs.ingestion == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy ingestion
        # Timeout-wrap flyctl deploy: the CLI has been observed to hang
        # indefinitely (incident 2026-05-07, run 25478908763 wiki-cron
        # wedged 70+ min after Fly-side rollout already completed). Without
        # a wall-clock cap one bad deploy locks the entire concurrency
        # group and supersedes every queued deploy. 25min covers slow
        # paths; exit 124 is treated as a real failure (NOT pretend-
        # success) because the deploy may be mid-rollout -- operator
        # checks `flyctl status -a <app>` before retrying.
        run: |
          set +e
          timeout 1500 flyctl deploy --remote-only -c fly.ingestion.toml --release-command-timeout 15m
          rc=$?
          if [ $rc -eq 124 ]; then
            echo "::error::flyctl deploy timed out after 1500s; investigate Fly state via 'flyctl status -a prbe-knowledge-ingestion'"
          fi
          exit $rc
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-retrieval:
    needs: [changes, deploy-ingestion]
    if: |
      always() &&
      needs.changes.outputs.retrieval == 'true' &&
      (needs.deploy-ingestion.result == 'success' || needs.deploy-ingestion.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy retrieval
        # See "Deploy ingestion" for timeout rationale.
        run: |
          set +e
          timeout 1500 flyctl deploy --remote-only -c fly.retrieval.toml
          rc=$?
          if [ $rc -eq 124 ]; then
            echo "::error::flyctl deploy timed out after 1500s; investigate Fly state via 'flyctl status -a prbe-knowledge-retrieval'"
          fi
          exit $rc
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-worker:
    needs: [changes, deploy-ingestion]
    if: |
      always() &&
      needs.changes.outputs.worker == 'true' &&
      (needs.deploy-ingestion.result == 'success' || needs.deploy-ingestion.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy worker
        # See "Deploy ingestion" for timeout rationale.
        run: |
          set +e
          timeout 1500 flyctl deploy --remote-only -c fly.worker.toml
          rc=$?
          if [ $rc -eq 124 ]; then
            echo "::error::flyctl deploy timed out after 1500s; investigate Fly state via 'flyctl status -a prbe-knowledge-worker'"
          fi
          exit $rc
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-poller:
    needs: [changes, deploy-ingestion]
    if: |
      always() &&
      needs.changes.outputs.poller == 'true' &&
      (needs.deploy-ingestion.result == 'success' || needs.deploy-ingestion.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy poller
        # See "Deploy ingestion" for timeout rationale.
        run: |
          set +e
          timeout 1500 flyctl deploy --remote-only -c fly.poller.toml
          rc=$?
          if [ $rc -eq 124 ]; then
            echo "::error::flyctl deploy timed out after 1500s; investigate Fly state via 'flyctl status -a prbe-knowledge-poller'"
          fi
          exit $rc
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # min_machines_running = 1 in fly.poller.toml is a floor, not a cap —
      # Fly will happily run more if it decides to. The poller MUST stay at 1
      # until a distributed lock + rate limiter exist (see fly.poller.toml).
      # Re-asserting count=1 every deploy is idempotent and cheap insurance.
      - name: Pin poller to exactly 1 machine
        # Wrap in `timeout 120` because flyctl scale count regressed in late
        # 2025 to spin indefinitely when the requested state matches current
        # state (no-op scale). Observed in prod: stuck pin steps hang the
        # workflow runner for hours, blocking every queued deploy on the
        # concurrency lock. Exit 124 (timeout fired) is treated as success
        # since the no-op case means current state is already target.
        # See incident on 2026-05-07 (deploy 25470960356, wiki-bootstrap).
        run: |
          set +e
          timeout 120 flyctl scale count poller=1 -a prbe-knowledge-poller --yes
          rc=$?
          if [ $rc -eq 0 ] || [ $rc -eq 124 ]; then exit 0; fi
          exit $rc
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-wiki-worker:
    needs: [changes, deploy-ingestion]
    if: |
      always() &&
      needs.changes.outputs.wiki_worker == 'true' &&
      (needs.deploy-ingestion.result == 'success' || needs.deploy-ingestion.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy wiki-worker
        # See "Deploy ingestion" for timeout rationale.
        run: |
          set +e
          timeout 1500 flyctl deploy --remote-only -c fly.wiki-worker.toml
          rc=$?
          if [ $rc -eq 124 ]; then
            echo "::error::flyctl deploy timed out after 1500s; investigate Fly state via 'flyctl status -a prbe-knowledge-wiki-worker'"
          fi
          exit $rc
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # `count = N` in fly.toml [[vm]] doesn't auto-scale on deploy —
      # follow up with explicit scale count to actually move the dial.
      # Timeout wrapper: see "Pin poller" comment above for the no-op-hang
      # regression rationale.
      - name: Pin wiki-worker to 4 machines
        run: |
          set +e
          timeout 120 flyctl scale count worker=4 -a prbe-knowledge-wiki-worker --yes
          rc=$?
          if [ $rc -eq 0 ] || [ $rc -eq 124 ]; then exit 0; fi
          exit $rc
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-wiki-synthesis:
    needs: [changes, deploy-ingestion]
    if: |
      always() &&
      needs.changes.outputs.wiki_synthesis == 'true' &&
      (needs.deploy-ingestion.result == 'success' || needs.deploy-ingestion.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy wiki-synthesis
        # See "Deploy ingestion" for timeout rationale.
        run: |
          set +e
          timeout 1500 flyctl deploy --remote-only -c fly.wiki-synthesis.toml
          rc=$?
          if [ $rc -eq 124 ]; then
            echo "::error::flyctl deploy timed out after 1500s; investigate Fly state via 'flyctl status -a prbe-knowledge-wiki-synthesis'"
          fi
          exit $rc
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # Timeout wrapper: see "Pin poller" comment for the no-op-hang regression.
      - name: Pin wiki-synthesis to 2 machines
        run: |
          set +e
          timeout 120 flyctl scale count worker=2 -a prbe-knowledge-wiki-synthesis --yes
          rc=$?
          if [ $rc -eq 0 ] || [ $rc -eq 124 ]; then exit 0; fi
          exit $rc
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-wiki-cron:
    needs: [changes, deploy-ingestion]
    if: |
      always() &&
      needs.changes.outputs.wiki_cron == 'true' &&
      (needs.deploy-ingestion.result == 'success' || needs.deploy-ingestion.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy wiki-cron
        # See "Deploy ingestion" for timeout rationale. wiki-cron is the
        # service that triggered the original incident -- the flyctl CLI
        # hung after Fly-side rollout completed (v44 was healthy while
        # the GH Actions step stayed in_progress for 70+ min).
        run: |
          set +e
          timeout 1500 flyctl deploy --remote-only -c fly.wiki-cron.toml
          rc=$?
          if [ $rc -eq 124 ]; then
            echo "::error::flyctl deploy timed out after 1500s; investigate Fly state via 'flyctl status -a prbe-knowledge-wiki-cron'"
          fi
          exit $rc
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-wiki-bootstrap:
    needs: [changes, deploy-ingestion]
    if: |
      always() &&
      needs.changes.outputs.wiki_bootstrap == 'true' &&
      (needs.deploy-ingestion.result == 'success' || needs.deploy-ingestion.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy wiki-bootstrap
        # See "Deploy ingestion" for timeout rationale.
        run: |
          set +e
          timeout 1500 flyctl deploy --remote-only -c fly.wiki-backfill.toml
          rc=$?
          if [ $rc -eq 124 ]; then
            echo "::error::flyctl deploy timed out after 1500s; investigate Fly state via 'flyctl status -a prbe-knowledge-wiki-backfill'"
          fi
          exit $rc
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # `count = N` in fly.toml [[vm]] doesn't auto-scale on deploy —
      # follow up with explicit scale count to actually move the dial.
      # Timeout wrapper: see "Pin poller" comment for the no-op-hang regression.
      - name: Pin wiki-bootstrap to 4 machines
        run: |
          set +e
          timeout 120 flyctl scale count worker=4 -a prbe-knowledge-wiki-bootstrap --yes
          rc=$?
          if [ $rc -eq 0 ] || [ $rc -eq 124 ]; then exit 0; fi
          exit $rc
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-community:
    needs: [changes, deploy-ingestion]
    if: |
      always() &&
      needs.changes.outputs.community == 'true' &&
      (needs.deploy-ingestion.result == 'success' || needs.deploy-ingestion.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy community
        # Nightly Leiden community-detection cron. See "Deploy ingestion"
        # for timeout rationale.
        run: |
          set +e
          timeout 1500 flyctl deploy --remote-only -c fly.community.toml
          rc=$?
          if [ $rc -eq 124 ]; then
            echo "::error::flyctl deploy timed out after 1500s; investigate Fly state via 'flyctl status -a prbe-knowledge-community'"
          fi
          exit $rc
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-inferred-edges:
    needs: [changes, deploy-ingestion]
    if: |
      always() &&
      needs.changes.outputs.inferred_edges == 'true' &&
      (needs.deploy-ingestion.result == 'success' || needs.deploy-ingestion.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy inferred-edges
        # Side-queue worker that drains inferred_edges_queue, builds
        # bundles, calls the LLM, and upserts INFERRED/AMBIGUOUS edges.
        # See "Deploy ingestion" for timeout rationale.
        run: |
          set +e
          timeout 1500 flyctl deploy --remote-only -c fly.inferred-edges.toml
          rc=$?
          if [ $rc -eq 124 ]; then
            echo "::error::flyctl deploy timed out after 1500s; investigate Fly state via 'flyctl status -a prbe-knowledge-inferred-edges'"
          fi
          exit $rc
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # `count = N` in fly.toml [[vm]] doesn't auto-scale on deploy —
      # follow up with explicit scale count. See "Pin poller" comment.
      - name: Pin inferred-edges to 4 machines
        run: |
          set +e
          timeout 120 flyctl scale count worker=4 -a prbe-knowledge-inferred-edges --yes
          rc=$?
          if [ $rc -eq 0 ] || [ $rc -eq 124 ]; then exit 0; fi
          exit $rc
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
