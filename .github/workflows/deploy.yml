name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ingestion:      ${{ steps.filter.outputs.ingestion      == 'true' || github.event_name == 'workflow_dispatch' }}
      retrieval:      ${{ steps.filter.outputs.retrieval      == 'true' || github.event_name == 'workflow_dispatch' }}
      worker:         ${{ steps.filter.outputs.worker         == 'true' || github.event_name == 'workflow_dispatch' }}
      poller:         ${{ steps.filter.outputs.poller         == 'true' || github.event_name == 'workflow_dispatch' }}
      wiki_worker:    ${{ steps.filter.outputs.wiki_worker    == 'true' || github.event_name == 'workflow_dispatch' }}
      wiki_synthesis: ${{ steps.filter.outputs.wiki_synthesis == 'true' || github.event_name == 'workflow_dispatch' }}
      wiki_cron:      ${{ steps.filter.outputs.wiki_cron      == 'true' || github.event_name == 'workflow_dispatch' }}
      wiki_bootstrap: ${{ steps.filter.outputs.wiki_bootstrap == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ingestion:
              - 'services/ingestion/**'
              - 'shared/**'
              - 'db/migrations/**'
              - 'alembic.ini'
              - 'fly.ingestion.toml'
              - 'pyproject.toml'
            retrieval:
              - 'services/retrieval/**'
              - 'shared/**'
              - 'fly.retrieval.toml'
              - 'pyproject.toml'
            worker:
              - 'services/ingestion/**'
              - 'services/worker/**'
              - 'shared/**'
              - 'fly.worker.toml'
              - 'pyproject.toml'
            poller:
              - 'services/ingestion/**'
              - 'services/worker/**'
              - 'shared/**'
              - 'fly.poller.toml'
              - 'pyproject.toml'
            wiki_worker:
              - 'services/synthesis/**'
              - 'services/ingestion/normalizer.py'
              - 'services/ingestion/handlers/**'
              - 'services/worker/**'
              - 'shared/**'
              - 'fly.wiki-worker.toml'
              - 'pyproject.toml'
            wiki_synthesis:
              - 'services/synthesis/**'
              - 'services/ingestion/normalizer.py'
              - 'services/ingestion/handlers/**'
              - 'services/worker/**'
              - 'shared/**'
              - 'fly.wiki-synthesis.toml'
              - 'pyproject.toml'
            wiki_cron:
              - 'services/synthesis/**'
              - 'services/worker/**'
              - 'shared/**'
              - 'fly.wiki-cron.toml'
              - 'pyproject.toml'
            wiki_bootstrap:
              - 'services/synthesis/**'
              - 'services/ingestion/normalizer.py'
              - 'services/ingestion/handlers/**'
              - 'services/worker/**'
              - 'shared/**'
              - 'fly.wiki-bootstrap.toml'
              - 'pyproject.toml'

  deploy-ingestion:
    needs: changes
    if: needs.changes.outputs.ingestion == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy ingestion
        run: flyctl deploy --remote-only -c fly.ingestion.toml --release-command-timeout 15m
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-retrieval:
    needs: [changes, deploy-ingestion]
    if: |
      always() &&
      needs.changes.outputs.retrieval == 'true' &&
      (needs.deploy-ingestion.result == 'success' || needs.deploy-ingestion.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy retrieval
        run: flyctl deploy --remote-only -c fly.retrieval.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-worker:
    needs: [changes, deploy-ingestion]
    if: |
      always() &&
      needs.changes.outputs.worker == 'true' &&
      (needs.deploy-ingestion.result == 'success' || needs.deploy-ingestion.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy worker
        run: flyctl deploy --remote-only -c fly.worker.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-poller:
    needs: [changes, deploy-ingestion]
    if: |
      always() &&
      needs.changes.outputs.poller == 'true' &&
      (needs.deploy-ingestion.result == 'success' || needs.deploy-ingestion.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy poller
        run: flyctl deploy --remote-only -c fly.poller.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # min_machines_running = 1 in fly.poller.toml is a floor, not a cap —
      # Fly will happily run more if it decides to. The poller MUST stay at 1
      # until a distributed lock + rate limiter exist (see fly.poller.toml).
      # Re-asserting count=1 every deploy is idempotent and cheap insurance.
      - name: Pin poller to exactly 1 machine
        run: flyctl scale count poller=1 -a prbe-knowledge-poller --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-wiki-worker:
    needs: [changes, deploy-ingestion]
    if: |
      always() &&
      needs.changes.outputs.wiki_worker == 'true' &&
      (needs.deploy-ingestion.result == 'success' || needs.deploy-ingestion.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy wiki-worker
        run: flyctl deploy --remote-only -c fly.wiki-worker.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # `count = N` in fly.toml [[vm]] doesn't auto-scale on deploy —
      # follow up with explicit scale count to actually move the dial.
      - name: Pin wiki-worker to 4 machines
        run: flyctl scale count worker=4 -a prbe-knowledge-wiki-worker --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-wiki-synthesis:
    needs: [changes, deploy-ingestion]
    if: |
      always() &&
      needs.changes.outputs.wiki_synthesis == 'true' &&
      (needs.deploy-ingestion.result == 'success' || needs.deploy-ingestion.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy wiki-synthesis
        run: flyctl deploy --remote-only -c fly.wiki-synthesis.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Pin wiki-synthesis to 2 machines
        run: flyctl scale count worker=2 -a prbe-knowledge-wiki-synthesis --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-wiki-cron:
    needs: [changes, deploy-ingestion]
    if: |
      always() &&
      needs.changes.outputs.wiki_cron == 'true' &&
      (needs.deploy-ingestion.result == 'success' || needs.deploy-ingestion.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy wiki-cron
        run: flyctl deploy --remote-only -c fly.wiki-cron.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-wiki-bootstrap:
    needs: [changes, deploy-ingestion]
    if: |
      always() &&
      needs.changes.outputs.wiki_bootstrap == 'true' &&
      (needs.deploy-ingestion.result == 'success' || needs.deploy-ingestion.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy wiki-bootstrap
        run: flyctl deploy --remote-only -c fly.wiki-bootstrap.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # `count = N` in fly.toml [[vm]] doesn't auto-scale on deploy —
      # follow up with explicit scale count to actually move the dial.
      - name: Pin wiki-bootstrap to 4 machines
        run: flyctl scale count worker=4 -a prbe-knowledge-wiki-bootstrap --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
