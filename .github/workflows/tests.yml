name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: prbe
          POSTGRES_PASSWORD: prbe
          POSTGRES_DB: prbe_knowledge
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U prbe -d prbe_knowledge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports: ["9000:9000"]
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL_SYNC: postgresql+psycopg://prbe:prbe@localhost:5432/prbe_knowledge
      DATABASE_URL: postgresql://prbe:prbe@localhost:5432/prbe_knowledge

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"

      - name: Migrate local DB
        run: .venv/bin/alembic upgrade head

      - name: Lint
        run: .venv/bin/ruff check .

      - name: Type-check
        run: .venv/bin/mypy shared services || true   # strict mypy soft-gated in Phase 0

      - name: Tests
        run: .venv/bin/pytest tests/ -q
