name: lint+typecheck

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"

      - name: Lint
        run: .venv/bin/ruff check .

      - name: Type-check
        run: .venv/bin/mypy engine kb services || true   # strict mypy soft-gated in Phase 0
