app = "prbe-knowledge-wiki-bootstrap"
primary_region = "sjc"
kill_signal = "SIGINT"
kill_timeout = "60s"

[build]
  dockerfile = "services/worker/Dockerfile"

[env]
  ENVIRONMENT        = "main"
  LOG_LEVEL          = "INFO"
  SERVICE_NAME       = "prbe-knowledge-wiki-bootstrap"
  WORKER_HEALTH_PORT = "8082"

[processes]
  worker = "python -m services.synthesis.bootstrap_app"

[[restart]]
  policy      = "always"
  max_retries = 10

[http_service]
  internal_port        = 8082
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["worker"]

  [[http_service.checks]]
    grace_period = "15s"
    interval     = "15s"
    method       = "GET"
    timeout      = "5s"
    path         = "/health"

# 2 x 4GB. Originally specced at 6GB but Fly's account limit caps
# shared VMs at 4GB. 4GB still holds the Pebble-scale fan-out (N
# in-flight CachedContent + per-source API page buffers + the
# Normalizer._persist embed/chunk pipeline) but leaves less OS+GC
# headroom. Watch first real bootstrap for OOM signals; if hit, scale
# down concurrency in the orchestrator instead of trying to bump
# memory past the cap.
[[vm]]
  size      = "shared-cpu-2x"
  memory    = "4gb"
  count     = 2
  processes = ["worker"]
