app = "prbe-knowledge-wiki-bootstrap"
primary_region = "sjc"
kill_signal = "SIGINT"
kill_timeout = "60s"

[build]
  dockerfile = "services/worker/Dockerfile"

[env]
  ENVIRONMENT          = "main"
  LOG_LEVEL            = "INFO"
  SERVICE_NAME         = "prbe-knowledge-wiki-bootstrap"
  WORKER_HEALTH_PORT   = "8082"
  # Per-machine cap on concurrent crawler agents. With 4 machines x
  # 6 = 24 concurrent crawls cluster-wide, drawn from any tenant's
  # pending queue ordered by started_at. Sized against the 4 GB / 2
  # vCPU envelope: idle ~150 MB + ~150-250 MB per active crawler =>
  # ~1.5 GB peak crawler load + ~2.5 GB headroom.
  BOOTSTRAP_PARALLELISM = "6"

[processes]
  worker = "python -m services.synthesis.bootstrap_app"

[[restart]]
  policy      = "always"
  max_retries = 10

[http_service]
  internal_port        = 8082
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["worker"]

  [[http_service.checks]]
    grace_period = "15s"
    interval     = "15s"
    method       = "GET"
    timeout      = "5s"
    path         = "/health"

# 4 x 4GB. Up from 2 now that the queue+claim worker model actually
# scales horizontally — each machine drains pending bootstrap rows in
# parallel via FOR UPDATE SKIP LOCKED, capped at BOOTSTRAP_PARALLELISM
# crawls per machine. 4 GB envelope holds ~6 concurrent crawlers
# (~150-250 MB each) with ~2.5 GB headroom; if first real bootstrap
# OOMs, drop BOOTSTRAP_PARALLELISM in [env] before bumping memory past
# Fly's shared-VM 4 GB cap.
[[vm]]
  size      = "shared-cpu-2x"
  memory    = "4gb"
  count     = 4
  processes = ["worker"]
