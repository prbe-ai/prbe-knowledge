app = "prbe-knowledge-wiki-bootstrap"
primary_region = "sjc"
kill_signal = "SIGINT"
kill_timeout = "60s"

[build]
  dockerfile = "services/worker/Dockerfile"

[env]
  ENVIRONMENT        = "main"
  LOG_LEVEL          = "INFO"
  SERVICE_NAME       = "prbe-knowledge-wiki-bootstrap"
  WORKER_HEALTH_PORT = "8082"

[processes]
  worker = "python -m services.synthesis.bootstrap_app"

[[restart]]
  policy      = "always"
  max_retries = 10

[http_service]
  internal_port        = 8082
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["worker"]

  [[http_service.checks]]
    grace_period = "15s"
    interval     = "15s"
    method       = "GET"
    timeout      = "5s"
    path         = "/health"

# 2 x 6GB. Bootstrap fans out N source crawlers in parallel for one
# customer, each running its own Gemini Pro AgentLoop with a CachedContent
# at 60% of 2M tokens. Pebble-scale customer with 6 connected sources can
# hold ~6 in-flight CachedContent + per-source API page buffers + the
# Normalizer._persist embed/chunk pipeline simultaneously. 6GB leaves
# OS+GC headroom; resize down once we have actual bootstrap memory
# numbers from a real run.
[[vm]]
  size      = "shared-cpu-2x"
  memory    = "6gb"
  count     = 2
  processes = ["worker"]
